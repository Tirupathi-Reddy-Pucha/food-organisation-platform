name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies (Backend)
      working-directory: ./backend
      run: npm ci || npm install

    - name: Build (Backend)
      working-directory: ./backend
      run: npm run build --if-present

    - name: Install dependencies (Client)
      working-directory: ./client
      run: npm ci || npm install

    - name: Build (Client)
      working-directory: ./client
      run: npm run build --if-present

  unit-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies (Backend)
      working-directory: ./backend
      run: npm ci || npm install
    - name: Install dependencies (Client)
      working-directory: ./client
      run: npm ci || npm install
    - name: Run Unit Tests (Backend)
      working-directory: ./backend
      run: npm run test:unit --if-present
    - name: Run Unit Tests (Client)
      working-directory: ./client
      run: npm run test:unit --if-present

  integration-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies (Backend)
      working-directory: ./backend
      run: npm ci || npm install
    - name: Install dependencies (Client)
      working-directory: ./client
      run: npm ci || npm install
    - name: Run Integration Tests (Backend)
      working-directory: ./backend
      run: npm run test:integration --if-present
    - name: Run Integration Tests (Client)
      working-directory: ./client
      run: npm run test:integration --if-present

  regression-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies (Backend)
      working-directory: ./backend
      run: npm ci || npm install
    - name: Install dependencies (Client)
      working-directory: ./client
      run: npm ci || npm install
    - name: Run Regression Tests (Backend)
      working-directory: ./backend
      run: npm run test:regression --if-present
    - name: Run Regression Tests (Client)
      working-directory: ./client
      run: npm run test:regression --if-present

  e2e-tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    - name: Install dependencies (Backend)
      working-directory: ./backend
      run: npm ci || npm install
    - name: Install dependencies (Client)
      working-directory: ./client
      run: npm ci || npm install
    - name: Run E2E Tests (Backend)
      working-directory: ./backend
      run: npm run test:e2e --if-present
    - name: Run E2E Tests (Client)
      working-directory: ./client
      run: npm run test:e2e --if-present
